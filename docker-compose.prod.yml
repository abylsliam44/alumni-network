services:
  postgres:
    image: postgres:16-alpine
    container_name: alumni-postgres-prod
    env_file:
      - .env.prod
    # No ports exposed to host for security, only internal network
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: alumni-backend-prod
    expose:
      - "8000"
    env_file:
      - .env.prod
    environment:
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - backend_uploads_prod:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: alumni-frontend-prod
    ports:
      - "3030:80" # Expose Nginx on port 3030 (Host) -> 80 (Container)
    env_file:
      - .env.prod
    depends_on:
      backend:
        condition: service_healthy
    restart: always

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: alumni-qdrant-prod
    expose:
      - "6333"
    volumes:
      - qdrant_data_prod:/qdrant/storage
    healthcheck:
      test: [ "CMD", "true" ]
      interval: 30s
      timeout: 5s
      retries: 1
    restart: always

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: alumni-agent-prod
    env_file:
      - .env.prod
    environment:
      - BACKEND_URL=http://backend:8000
      - BACKEND_API_SECRET=${BACKEND_API_SECRET:-agent-secret-key}
    volumes:
      - ./.env.prod:/app/.env
    depends_on:
      backend:
        condition: service_healthy
    restart: always

volumes:
  postgres_data_prod:
  backend_uploads_prod:
  qdrant_data_prod:
  minio_data_prod:
