services:
  postgres:
    image: postgres:16-alpine
    container_name: alumni-postgres-prod
    env_file:
      - .env.prod
    # No ports exposed to host for security, only internal network
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: alumni-backend-prod
    expose:
      - "8000"
    env_file:
      - .env.prod
    environment:
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - backend_uploads_prod:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-celery:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: alumni-celery-worker-prod
    command: ["celery", "-A", "app.core.celery_app.celery_app", "worker", "--loglevel=info", "-Q", "resumes,opportunities,recommendations,default"]
    env_file:
      - .env.prod
    environment:
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - backend_uploads_prod:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis-celery:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    restart: always

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: alumni-celery-beat-prod
    command: ["celery", "-A", "app.core.celery_app.celery_app", "beat", "--loglevel=info"]
    env_file:
      - .env.prod
    environment:
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - backend_uploads_prod:/app/uploads
    depends_on:
      backend:
        condition: service_healthy
      redis-celery:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: alumni-frontend-prod
    ports:
      - "3030:80" # Expose Nginx on port 3030 (Host) -> 80 (Container)
    env_file:
      - .env.prod
    depends_on:
      backend:
        condition: service_healthy
    restart: always

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: alumni-qdrant-prod
    expose:
      - "6333"
    volumes:
      - qdrant_data_prod:/qdrant/storage
    healthcheck:
      test: [ "CMD", "true" ]
      interval: 30s
      timeout: 5s
      retries: 1
    restart: always

  redis-cache:
    image: redis:7-alpine
    container_name: alumni-redis-cache-prod
    command: sh -c 'redis-server --save "" --appendonly no --maxmemory ${REDIS_CACHE_MAXMEMORY:-256mb} --maxmemory-policy allkeys-lru'
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis-celery:
    image: redis:7-alpine
    container_name: alumni-redis-celery-prod
    command: redis-server --appendonly yes
    expose:
      - "6379"
    volumes:
      - redis_celery_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  minio:
    image: minio/minio:latest
    container_name: alumni-minio-prod
    command: server /data --console-address ":9001"
    expose:
      - "9000"
      - "9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data_prod:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always

volumes:
  postgres_data_prod:
  backend_uploads_prod:
  qdrant_data_prod:
  minio_data_prod:
  redis_celery_data_prod:
