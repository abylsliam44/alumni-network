version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: alumni-postgres
    env_file:
      - .env.prod
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-alumni_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-alumni_password}
      - POSTGRES_DB=${POSTGRES_DB:-alumni_db}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alumni_user} -d ${POSTGRES_DB:-alumni_db}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: alumni-backend
    ports:
      - "8010:8000"
    env_file:
      - .env.prod
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg2://${POSTGRES_USER:-alumni_user}:${POSTGRES_PASSWORD:-alumni_password}@postgres:5432/${POSTGRES_DB:-alumni_db}}
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS:-http://localhost:3030,http://frontend:3030}
      - UPLOAD_DIR=/app/uploads
      - UVICORN_WORKERS=${UVICORN_WORKERS:-4}
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8010}
    container_name: alumni-frontend
    ports:
      - "3030:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: alumni-qdrant
    expose:
      - "6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  backend_uploads:
  qdrant_data:
