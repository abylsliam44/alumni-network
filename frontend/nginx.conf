server {
    listen 80;
    server_name _;

    # Serve static assets built by Vite
    root /usr/share/nginx/html;
    index index.html;

    # Cache static assets aggressively; keep HTML dynamic for SPA routing
    location /assets/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Single Page App fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Basic health check endpoint for Docker healthcheck if needed
    location = /health {
        add_header Content-Type text/plain;
        return 200 'ok';
    }
}
