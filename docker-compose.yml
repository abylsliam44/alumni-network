services:
  postgres:
    image: postgres:16-alpine
    container_name: alumni-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alumni_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alumni_password}
      POSTGRES_DB: ${POSTGRES_DB:-alumni_db}
    ports:
      - "5543:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alumni_user} -d ${POSTGRES_DB:-alumni_db}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alumni-backend
    ports:
      - "8010:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-alumni_user}:${POSTGRES_PASSWORD:-alumni_password}@postgres:5432/${POSTGRES_DB:-alumni_db}
      - POSTGRES_USER=${POSTGRES_USER:-alumni_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-alumni_password}
      - POSTGRES_DB=${POSTGRES_DB:-alumni_db}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: alumni-frontend
    ports:
      - "3030:3000"
    environment:
      - VITE_API_URL=http://localhost:8010
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  backend_uploads:
