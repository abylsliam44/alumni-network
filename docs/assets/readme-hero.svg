<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Alumni Social Network developer overview banner</title>
  <desc id="desc">A developer themed banner showing a code editor, API terminal, service nodes, and product cards for the Alumni Social Network.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.48" stop-color="#16324F"/>
      <stop offset="1" stop-color="#0B4A54"/>
    </linearGradient>
    <linearGradient id="accent" x1="87" y1="55" x2="1116" y2="318" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.52" stop-color="#A7F3D0"/>
      <stop offset="1" stop-color="#FDE68A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="34" fill="url(#bg)"/>
  <path d="M80 279 C215 162 298 296 439 175 C587 48 689 289 841 170 C958 79 1048 130 1134 65" stroke="url(#accent)" stroke-width="2.2" stroke-linecap="round" opacity="0.65"/>
  <path d="M78 304 C231 235 314 343 478 237 C635 136 748 304 897 212 C1018 138 1076 190 1134 146" stroke="#67E8F9" stroke-width="1.4" stroke-linecap="round" opacity="0.27"/>

  <g opacity="0.55">
    <circle cx="86" cy="72" r="3" fill="#A7F3D0"/>
    <circle cx="111" cy="91" r="2" fill="#FDE68A"/>
    <circle cx="1080" cy="86" r="3" fill="#38BDF8"/>
    <circle cx="1038" cy="277" r="2" fill="#FDE68A"/>
    <circle cx="158" cy="289" r="2" fill="#38BDF8"/>
    <circle cx="604" cy="58" r="2" fill="#A7F3D0"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="62" width="442" height="232" rx="20" fill="#0B1120" stroke="#334155"/>
    <rect x="70" y="62" width="442" height="40" rx="20" fill="#111827"/>
    <circle cx="98" cy="82" r="6" fill="#F87171"/>
    <circle cx="119" cy="82" r="6" fill="#FBBF24"/>
    <circle cx="140" cy="82" r="6" fill="#34D399"/>
    <text x="166" y="87" fill="#94A3B8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">backend/app/main.py</text>
    <text x="96" y="138" fill="#38BDF8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">app.include_router(api_router)</text>
    <text x="96" y="171" fill="#A7F3D0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">GET /api/health -&gt; 200 OK</text>
    <text x="96" y="204" fill="#FDE68A" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">docker compose up -d --build</text>
    <rect x="96" y="236" width="258" height="20" rx="10" fill="#1E293B"/>
    <rect x="96" y="236" width="184" height="20" rx="10" fill="#22C55E"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="562" y="60" width="568" height="235" rx="24" fill="#F8FAFC"/>
    <rect x="592" y="94" width="225" height="76" rx="16" fill="#E0F2FE" stroke="#7DD3FC"/>
    <rect x="846" y="94" width="225" height="76" rx="16" fill="#ECFDF5" stroke="#86EFAC"/>
    <rect x="592" y="195" width="225" height="66" rx="16" fill="#FEF3C7" stroke="#FACC15"/>
    <rect x="846" y="195" width="225" height="66" rx="16" fill="#F1F5F9" stroke="#CBD5E1"/>
    <text x="618" y="124" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Profiles</text>
    <text x="618" y="149" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="13">skills, resumes, network</text>
    <text x="872" y="124" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Mentorship</text>
    <text x="872" y="149" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="13">plans, sessions, feedback</text>
    <text x="618" y="224" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Jobs + Projects</text>
    <text x="618" y="248" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="13">applications and matching</text>
    <text x="872" y="224" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">AI + Search</text>
    <text x="872" y="248" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="13">RAG, Qdrant, recommendations</text>
    <path d="M817 132 H846" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
    <path d="M705 170 V195" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
    <path d="M958 170 V195" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
  </g>

  <text x="72" y="326" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">React frontend</text>
  <text x="226" y="326" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">FastAPI backend</text>
  <text x="397" y="326" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">AI recommendations</text>
  <text x="610" y="326" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Docker-first workflow</text>
</svg>
